id=\"l-f47r-1-16\"><choice><orig><choice><abbr>Puiſq՚<\/abbr><expan resp=\"#SDM\">Puiſq<ex>ue<\/ex><\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>Puisq՚<\/abbr><expan resp=\"#SDM\">Puisq<ex>ue<\/ex><\/expan><\/choice><\/reg><\/choice> <choice><orig>chaſcune<\/orig><reg resp=\"#SDM\">chascune<\/reg><\/choice> en amendoit<\/l>\n                    <l xml:id=\"l-f47r-1-17\">Celle <choice><orig>beſte<\/orig><reg resp=\"#SDM\">beste<\/reg><\/choice> donc <choice><orig>ſoit<\/orig><reg resp=\"#SDM\">soit<\/reg><\/choice> benoite<\/l>\n                    <l xml:id=\"l-f47r-1-18\">Par quoy a bien faire <choice><orig>couuoite<\/orig><reg resp=\"#SDM\">couvoite<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f47r-1-19\"><choice><orig>Chaſcune<\/orig><reg resp=\"#SDM\">Chascune<\/reg><\/choice> <choice><orig>beſte<\/orig><reg resp=\"#SDM\">beste<\/reg><\/choice> qui <choice><orig>lauoit<\/orig><reg resp=\"#SDM\">l'avoit<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f47r-1-20\">De ce <choice><orig>chaſcun<\/orig><reg resp=\"#SDM\">chascun<\/reg><\/choice> certain en <choice><orig>ſoit<\/orig><reg resp=\"#SDM\">soit<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f47r-1-21\">La <choice><orig>beſte<\/orig><reg resp=\"#SDM\">beste<\/reg><\/choice> <choice><abbr>ꝑ<\/abbr><expan resp=\"#SDM\">p<ex>ar<\/ex><\/expan><\/choice> grant attrempance<\/l>\n                    <l xml:id=\"l-f47r-1-22\"><choice><orig>Receuoit<\/orig><reg resp=\"#SDM\">Recevoit<\/reg><\/choice> de <choice><orig>ſa<\/orig><reg resp=\"#SDM\">sa<\/reg><\/choice> <choice><orig>ſouſtenance<\/orig><reg resp=\"#SDM\">soustenance<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f47r-1-23\">Ce <choice><orig>ſanz<\/orig><reg resp=\"#SDM\">sanz<\/reg><\/choice> plus qui lui <choice><orig>couuenoit<\/orig><reg resp=\"#SDM\">couvenoit<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f47r-1-24\"><choice><orig>Treſtout<\/orig><reg resp=\"#SDM\">Trestout<\/reg><\/choi  <choice><orig>apꝛes<\/orig><reg resp=\"#SDM\">apres<\/reg><\/choice> ce <choice><orig>mappella<\/orig><reg resp=\"#SDM\">m'appella<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-18\">Li dieux et <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> me <choice><orig>diſt<\/orig><reg resp=\"#SDM\">dist<\/reg><\/choice> de la<\/l>\n                    <l xml:id=\"l-f50v-2-19\">Ou tu as <choice><orig>eſte<\/orig><reg resp=\"#SDM\">esté<\/reg><\/choice> quoy te <choice><orig>ſamble<\/orig><reg resp=\"#SDM\">samble<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-20\">Sire dis <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> le cuer me tramble<\/l>\n                    <l xml:id=\"l-f50v-2-21\">Toutes les foiz <choice><orig>quil<\/orig><reg resp=\"#SDM\">qu'il<\/reg><\/choice> <choice><orig>men<\/orig><reg resp=\"#SDM\">m'en<\/reg><\/choice> <choice><orig><choice><abbr>ſouuiēt<\/abbr><expan resp=\"#SDM\">ſouuie<ex>n<\/ex>t<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>souviēt<\/abbr><expan resp=\"#SDM\">souvie<ex>n<\/ex>t<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-22\">Mais puis que dire le <choice><orig>couuient<\/orig><reg resp=\"#SDM\">couvient<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-23\">Tout <choice><orig>dꝛoit<\/orig><reg resp=\"#SDM\">droit<\/reg><\/choice> <choice><abbr>ꝑ<\/abbr><expan resp=\"#SDM\">p<ex>ar<\/ex><\/expan><\/choice> my le voir iray<\/l>\n                    <l xml:id=\"l-f50v-2-24\">Que <choice><orig>ia<\/orig><reg resp=\"#SDM\">ja<\/reg><\/choice> ne vous en mentiray<\/l>\n                    <l xml:id=\"l-f50v-2-25\">Quant <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> en <choice><orig>ſailli<\/orig><reg resp=\"#SDM\">sailli<\/reg><\/choice> oultre la haie<\/l>\n                    <l xml:id=\"l-f50v-2-26\">Qui <choice><abbr>ml՚t<\/abbr><expan resp=\"#SDM\">m<ex>ou<\/ex>lt<\/expan><\/choice> <choice><orig>meſbahi<\/orig><reg resp=\"#SDM\">m'esbahi<\/reg><\/choice> et <choice><orig>eſmaie<\/orig><reg resp=\"#SDM\">esmaie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-27\"><choice><orig>Ialay<\/orig><reg resp=\"#SDM\">J'alay<\/reg><\/choice> tant par my la valee<\/l>\n                    <l xml:id=\"l-f50v-2-28\">Que <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> eu la panthere <choice><orig>trouuee<\/orig><reg resp=\"#SDM\">trouvee<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-29\">Mais onques <choice><orig><choice><abbr>ſamblāt<\/abbr><expan resp=\"#SDM\">ſambla<ex>n<\/ex>t<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>samblāt<\/abbr><expan resp=\"#SDM\">sambla<ex>n<\/ex>t<\/expan><\/choice><\/reg><\/choice> <choice><orig>noſai<\/orig><reg resp=\"#SDM\">n'osai<\/reg><\/choice> faire<\/l>\n                    <l xml:id=\"l-f50v-2-30\">De ce que <choice><abbr>tāt<\/abbr><expan resp=\"#SDM\">ta<ex>n<\/ex>t<\/expan><\/choice> me <choice><orig>pouoit<\/orig><reg resp=\"#SDM\">povoit<\/reg><\/choice> plaire<\/l>\n                    <l xml:id=\"l-f50v-2-31\">Que mon cuer <choice><orig>oſter<\/orig><reg resp=\"#SDM\">oster<\/reg><\/choice> <choice><orig>nen<\/orig><reg resp=\"#SDM\">n'en<\/reg><\/choice> <choice><orig>pouoie<\/orig><reg resp=\"#SDM\">povoie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-32\">A courroucier tant la doubtoie<\/l>\n                    <l xml:id=\"l-f50v-2-33\">Et quant <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> cuidai <choice><orig>reuenir<\/orig><reg resp=\"#SDM\">revenir<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-34\"><choice><orig>Loꝛs<\/orig><reg resp=\"#SDM\">Lors<\/reg><\/choice> me <choice><orig>pꝛiſtrent<\/orig><reg resp=\"#SDM\">pristrent<\/reg><\/choice> a retenir<\/l>\n                    <l xml:id=\"l-f50v-2-35\"><choice><orig>Eſpines<\/orig><reg resp=\"#SDM\">Espines<\/reg><\/choice> ronces et ourties<\/l>\n                    <l xml:id=\"l-f50v-2-36\">De moy <choice><orig>greuer<\/orig><reg resp=\"#SDM\">grever<\/reg><\/choice> <choice><abbr>ml՚t<\/abbr><expan resp=\"#SDM\">m<ex>ou<\/ex>lt<\/expan><\/choice> ahaities<\/l>\n                    <l xml:id=\"l-f50v-2-37\"><choice><orig>Ainſi<\/orig><reg resp=\"#SDM\">Ainsi<\/reg><\/choice> comme vous me <choice><orig>trouuaſtes<\/orig><reg resp=\"#SDM\">trouvastes<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f50v-2-38\"><choice><abbr>Quāt<\/abbr><expan resp=\"#SDM\">Qua<ex>n<\/ex>t<\/expan><\/choice> <choice><orig><choice><abbr>ur՚e<\/abbr><expan resp=\"#SDM\">u<ex>ost<\/ex>re<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>vr՚e<\/abbr><expan resp=\"#SDM\">v<ex>ost<\/ex>re<\/expan><\/choice><\/reg><\/choice> merci <choice><orig>men<\/orig><reg resp=\"#SDM\">m'en<\/reg><\/choice> <choice><orig>gitaſtes<\/orig><reg resp=\"#SDM\">gitastes<\/reg><\/choice><\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitblue\" xml:id=\"l-f50v-2-39\">Le dieu me <choice><orig>diſt<\/orig><reg resp=\"#SDM\">dist<\/reg><\/choice> <choice><orig>loꝛs<\/orig><reg resp=\"#SDM\">lors<\/reg><\/choice> <choice><abbr>doulcemēt<\/abbr><expan resp=\"#SDM\">doulceme<ex>n<\/ex>t<\/expan><\/choice><\/l>\n                    <pb n=\"51r\" xml:id=\"f51r\"/>\n                    <cb n=\"1\" xml:id=\"cb-f51r-1\"/>\n                    <l xml:id=\"l-f51r-1-1\">Amis pour ton <choice><orig>enſeignement<\/orig><reg resp=\"#SDM\">enseignement<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-2\"><choice><orig>Eſt<\/orig><reg resp=\"#SDM\">Est<\/reg><\/choice> tout ce que tu as veu<\/l>\n                    <l xml:id=\"l-f51r-1-3\">Car <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> com <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> <choice><orig>lay<\/orig><reg resp=\"#SDM\">l'ay<\/reg><\/choice> <choice><orig>ſceu<\/orig><reg resp=\"#SDM\">sceu<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-4\">Ne plus que tu <choice><orig>oſas<\/orig><reg resp=\"#SDM\">osas<\/reg><\/choice> la <choice><orig>teſte<\/orig><reg resp=\"#SDM\">teste<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-5\">Tourner <choice><orig>deuers<\/orig><reg resp=\"#SDM\">devers<\/reg><\/choice> la belle <choice><orig>beſte<\/orig><reg resp=\"#SDM\">beste<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-6\">Ne euz tu onques hardemant<\/l>\n                    <l xml:id=\"l-f51r-1-7\">Ne <choice><orig>deiſſes<\/orig><reg resp=\"#SDM\">deisses<\/reg><\/choice> apertemant<\/l>\n                    <l xml:id=\"l-f51r-1-8\">Ne <choice><orig>deſcouuriſſes<\/orig><reg resp=\"#SDM\">descouvrisses<\/reg><\/choice> ton couraige<\/l>\n                    <l xml:id=\"l-f51r-1-9\">Ta dame la bonne la <choice><orig>ſaige<\/orig><reg resp=\"#SDM\">saige<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-10\">A <choice><orig>ainſi<\/orig><reg resp=\"#SDM\">ainsi<\/reg><\/choice> <choice><orig>eſte<\/orig><reg resp=\"#SDM\">esté<\/reg><\/choice> <choice><orig>aſſaillis<\/orig><reg resp=\"#SDM\">assaillis<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-11\">Des <choice><orig>eſpines<\/orig><reg resp=\"#SDM\">espines<\/reg><\/choice> et mal baillis<\/l>\n                    <l xml:id=\"l-f51r-1-12\">Qui les <choice><orig>meſdiſans<\/orig><reg resp=\"#SDM\">mesdisans<\/reg><\/choice> <choice><orig>ſignifient<\/orig><reg resp=\"#SDM\">signifient<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-13\">Qui des amans <choice><orig>touſdis<\/orig><reg resp=\"#SDM\">tousdis<\/reg><\/choice> <choice><orig><choice><abbr>meſdiēt<\/abbr><expan resp=\"#SDM\">meſdie<ex>n<\/ex>t<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>mesdiēt<\/abbr><expan resp=\"#SDM\">mesdie<ex>n<\/ex>t<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-14\"><choice><orig>Ainſi<\/orig><reg resp=\"#SDM\">Ainsi<\/reg><\/choice> bien com <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> dit <choice><orig>euſſe<\/orig><reg resp=\"#SDM\">eusse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-15\">Ce que dire et faire <choice><orig>deuſſe<\/orig><reg resp=\"#SDM\">deusse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-16\">Si te lo que quant tu <choice><orig>ſauras<\/orig><reg resp=\"#SDM\">sauras<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-17\">Que tu et etmps et lieu auras<\/l>\n                    <l xml:id=\"l-f51r-1-18\">Que tous <choice><orig>teſ<\/orig><reg resp=\"#SDM\">tes<\/reg><\/choice> <choice><orig>meſchiefz<\/orig><reg resp=\"#SDM\">meschiefz<\/reg><\/choice> tu lui dies<\/l>\n                    <l xml:id=\"l-f51r-1-19\">Et toutes tes griefz maladies<\/l>\n                    <l xml:id=\"l-f51r-1-20\">Car <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> tu lui as <choice><orig>deſcouuertes<\/orig><reg resp=\"#SDM\">descouvertes<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f51r-1-21\">Il <choice><orig>naura<\/orig><reg resp=\"#SDM\">n'aura<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> cruel cuer certes<\/l>\n                    <l xml:id=\"l-f51r-1-22\"><choice><orig>Enuers<\/orig><reg resp=\"#SDM\">Envers<\/reg><\/choice> toy que elle ne <choice><orig>ſen<\/orig><reg resp=\"#SDM\">s'en<\/reg><\/choice> dueille<\/l>\n                    <l xml:id=\"l-f51r-1-23\">Et que plus de bien ne te vueille<\/l>\n                    <l xml:id=\"l-f51r-1-24\"><choice><orig>Ie<\/orig><reg resp=\"#SDM\">Je<\/reg><\/choice> ne puiz ci plus remanoir<\/l>\n                    <l xml:id=\"l-f51r-1-25\">Tu <choice><orig>ten<\/orig><reg resp=\"#SDM\">t'en<\/reg><\/choice> iras a mon manoir<\/l>\n                    <l xml:id=\"l-f51r-1-26\"><choice><orig>Iuſqua<\/orig><reg resp=\"#SDM\">Jusqu'a<\/reg><\/choice> ta "#SDM\">qu'elle<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-27\">Quant ce dict verra ou <choice><orig>oꝛra<\/orig><reg resp=\"#SDM\">orra<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-28\"><choice><orig>Ia<\/orig><reg resp=\"#SDM\">Ja<\/reg><\/choice> pour ce piz ne <choice><orig><choice><abbr>mē<\/abbr><expan resp=\"#SDM\">me<ex>n<\/ex><\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>m'ē<\/abbr><expan resp=\"#SDM\">m'e<ex>n<\/ex><\/expan><\/choice><\/reg><\/choice> <choice><orig>voꝛra<\/orig><reg resp=\"#SDM\">vorra<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-29\">Pour quoy. <choice><orig>quelle<\/orig><reg resp=\"#SDM\">qu'elle<\/reg><\/choice> <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> bonne <choice><abbr>⁊<\/abbr><expan resp=\"#SDM\"><ex>et<\/ex><\/expan><\/choice> <choice><orig>ſaige<\/orig><reg resp=\"#SDM\">saige<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-30\">Et <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> <choice><orig>laims<\/orig><reg resp=\"#SDM\">l'aims<\/reg><\/choice> de loyal couraige<\/l>\n                    <l xml:id=\"l-f54r-1-31\">Se pour amour rendoit hayne<\/l>\n                    <l xml:id=\"l-f54r-1-32\">Mains en <choice><orig>ſeroit<\/orig><reg resp=\"#SDM\">seroit<\/reg><\/choice> et bonne et fine<\/l>\n                    <l xml:id=\"l-f54r-1-33\">Nulz tant ait le cuer de plein <choice><orig>dayꝛ<\/orig><reg resp=\"#SDM\">d'ayr<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-34\">Ne doit pour bien amer <choice><orig>hayꝛ<\/orig><reg resp=\"#SDM\">hayr<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-35\">Mais voulentier vous requerroie<\/l>\n                    <l xml:id=\"l-f54r-1-36\"><choice><orig>Encoꝛ<\/orig><reg resp=\"#SDM\">Encor<\/reg><\/choice> dame <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> <choice><orig>oſoie<\/orig><reg resp=\"#SDM\">osoie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-37\">Que par amout me <choice><orig>deiſſiez<\/orig><reg resp=\"#SDM\">deissiez<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-38\">Et que certain <choice><orig>men<\/orig><reg resp=\"#SDM\">m'en<\/reg><\/choice> <choice><orig>feiſſiez<\/orig><reg resp=\"#SDM\">feissiez<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-1-39\">De ma demande <choice><orig>oꝛ<\/orig><reg resp=\"#SDM\">or<\/reg><\/choice> <choice><orig>leſcoutez<\/orig><reg resp=\"#SDM\">l'escoutez<\/reg><\/choice><\/l>\n                    <cb n=\"2\" xml:id=\"cb-f54r-2\"/>\n                    <l xml:id=\"l-f54r-2-1\">Pour quoi li amans <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> boutez<\/l>\n                    <l xml:id=\"l-f54r-2-2\">En la cire. et qui <choice><orig>ſignifie<\/orig><reg resp=\"#SDM\">signifie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-3\">Car <choice><orig>ainſi<\/orig><reg resp=\"#SDM\">ainsi<\/reg><\/choice> ne le <choice><orig>ſcai<\/orig><reg resp=\"#SDM\">scai<\/reg><\/choice> <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> mie<\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitgold\" xml:id=\"l-f54r-2-4\">Elle <choice><orig>diſt<\/orig><reg resp=\"#SDM\">dist<\/reg><\/choice> tu le <choice><orig>moꝛras<\/orig><reg resp=\"#SDM\">m'orras<\/reg><\/choice> dire<\/l>\n                    <l xml:id=\"l-f54r-2-5\">Tant que il te <choice><orig>deura<\/orig><reg resp=\"#SDM\">devra<\/reg><\/choice> <choice><orig>ſouffire<\/orig><reg resp=\"#SDM\">souffire<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-6\">Ly anneaulx <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> en <choice><orig>leſcripture<\/orig><reg resp=\"#SDM\">l'escripture<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-7\">Pour ce que par la main la cure<\/l>\n                    <l xml:id=\"l-f54r-2-8\">De ton cuer. et la <choice><orig>ſeignoꝛie<\/orig><reg resp=\"#SDM\">seignorie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-9\">Donras. <choice><orig>ſanz<\/orig><reg resp=\"#SDM\">sanz<\/reg><\/choice> faire de partie<\/l>\n                    <l xml:id=\"l-f54r-2-10\">Plus bel que par nulle aultre <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-11\">A ta dame ou ton bien <choice><orig>repoſe<\/orig><reg resp=\"#SDM\">repose<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-12\">Qui <choice><orig>na<\/orig><reg resp=\"#SDM\">n'a<\/reg><\/choice> en el vice ne faude<\/l>\n                    <l xml:id=\"l-f54r-2-13\">Mais <choice><abbr>q՚<\/abbr><expan resp=\"#SDM\">q<ex>ue<\/ex><\/expan><\/choice> <choice><orig>lannel<\/orig><reg resp=\"#SDM\">l'annel<\/reg><\/choice> ayt <choice><orig>eſmeraude<\/orig><reg resp=\"#SDM\">esmeraude<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-14\">Car la pierre <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice> clere<\/l>\n                    <l xml:id=\"l-f54r-2-15\">Et li anneaulx ont grant <choice><orig>miſtere<\/orig><reg resp=\"#SDM\">mistere<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-16\">Et plus <choice><orig>plaiſans<\/orig><reg resp=\"#SDM\">plaisans<\/reg><\/choice> <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> annelet<\/l>\n                    <l xml:id=\"l-f54r-2-17\">A donner <choice><orig>quaultre<\/orig><reg resp=\"#SDM\">qu'aultre<\/reg><\/choice> <choice><orig>iouuelet<\/orig><reg resp=\"#SDM\">jouvelet<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-18\"><choice><orig>Quon<\/orig><reg resp=\"#SDM\">Qu'on<\/reg><\/choice> le voit au <choice><orig>ſoir<\/orig><reg resp=\"#SDM\">soir<\/reg><\/choice> et au main<\/l>\n                    <l xml:id=\"l-f54r-2-19\">Pour ce <choice><orig>quon<\/orig><reg resp=\"#SDM\">qu'on<\/reg><\/choice> le <choice><orig>poꝛte<\/orig><reg resp=\"#SDM\">porte<\/reg><\/choice> en la main<\/l>\n                    <l xml:id=\"l-f54r-2-20\">Et les yeulx voient <choice><orig>cest<\/orig><reg resp=\"#SDM\">c'est<\/reg><\/choice> la <choice><orig>ſomme<\/orig><reg resp=\"#SDM\">somme<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-21\">Plus les mains que <choice><abbr>riēs<\/abbr><expan resp=\"#SDM\">rie<ex>n<\/ex>s<\/expan><\/choice> <choice><orig>deſur<\/orig><reg resp=\"#SDM\">desur<\/reg><\/choice> <choice><orig><choice><abbr>lōme<\/abbr><expan resp=\"#SDM\">lo<ex>m<\/ex>me<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>l'ōme<\/abbr><expan resp=\"#SDM\">l'o<ex>m<\/ex>me<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-22\">Et <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> te puis pour voir bien dire<\/l>\n                    <l xml:id=\"l-f54r-2-23\">Que ce <choice><orig>quon<\/orig><reg resp=\"#SDM\">qu'on<\/reg><\/choice> voit <choice><orig>ſouuant<\/orig><reg resp=\"#SDM\">souvant<\/reg><\/choice> et mire<\/l>\n                    <l xml:id=\"l-f54r-2-24\">Cellui qui le voit plus <choice><orig>confoꝛte<\/orig><reg resp=\"#SDM\">conforte<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-25\">Quant le lieu <choice><orig>plaiſt<\/orig><reg resp=\"#SDM\">plaist<\/reg><\/choice> <choice><abbr>dōt<\/abbr><expan resp=\"#SDM\">do<ex>n<\/ex>t<\/expan><\/choice> on <choice><orig>lappoꝛte<\/orig><reg resp=\"#SDM\">l'apporte<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-26\">Se de <choice><orig>lannel<\/orig><reg resp=\"#SDM\">l'annel<\/reg><\/choice> veulz la <choice><orig>puiſſance<\/orig><reg resp=\"#SDM\">puissance<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-27\"><choice><orig>Sauoir<\/orig><reg resp=\"#SDM\">Savoir<\/reg><\/choice> et la <choice><orig>ſignifiance<\/orig><reg resp=\"#SDM\">signifiance<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-28\">De <choice><orig>loꝛ<\/orig><reg resp=\"#SDM\">lor<\/reg><\/choice> et de la pierre bonne<\/l>\n                    <l xml:id=\"l-f54r-2-29\">Que <choice><orig>chaſcun<\/orig><reg resp=\"#SDM\">chascun<\/reg><\/choice> a entendre donne<\/l>\n                    <l xml:id=\"l-f54r-2-30\">Et queles <choice><abbr>v՚tus<\/abbr><expan resp=\"#SDM\">v<ex>er<\/ex>tus<\/expan><\/choice> peuent auoir<\/l>\n                    <l xml:id=\"l-f54r-2-31\">La <choice><orig>uerite<\/orig><reg resp=\"#SDM\">verité<\/reg><\/choice> pourras <choice><orig>ſauoir<\/orig><reg resp=\"#SDM\">savoir<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-32\">Mais wue tu vueilles ou ditt lire<\/l>\n                    <l xml:id=\"l-f54r-2-33\"><choice><orig>Qun<\/orig><reg resp=\"#SDM\">Q'un<\/reg><\/choice> clerc <choice><orig>fiſt<\/orig><reg resp=\"#SDM\">fist<\/reg><\/choice> <choice><abbr>dōt<\/abbr><expan resp=\"#SDM\">do<ex>n<\/ex>t<\/expan><\/choice> le nom vueil dire<\/l>\n                    <l xml:id=\"l-f54r-2-34\">Que la <choice><orig>nen<\/orig><reg resp=\"#SDM\">n'en<\/reg><\/choice> yert par moy <choice><orig>cele<\/orig><reg resp=\"#SDM\">celé<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-35\"><choice><orig>Maiſtre<\/orig><reg resp=\"#SDM\">Maistre<\/reg><\/choice> <choice><orig>iehan<\/orig><reg resp=\"#SDM\">Jehan<\/reg><\/choice> <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> <choice><orig>appelle<\/orig><reg resp=\"#SDM\">appellé<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54r-2-36\"><choice><orig>Leſpicier<\/orig><reg resp=\"#SDM\">L'espicier<\/reg><\/choice>. cilz qui la dittie<\/l>\n                    <l xml:id=\"l-f54r-2-37\">Pour ce <choice><orig>quil<\/orig><reg resp=\"#SDM\">qu'il<\/reg><\/choice> a en <choice><orig>ſon ">se<\/reg><\/choice> fie<\/l>\n                    <l xml:id=\"l-f54v-2-29\">Que plus y <choice><orig>giſt<\/orig><reg resp=\"#SDM\">gist<\/reg><\/choice> et <choice><orig>moꝛt<\/orig><reg resp=\"#SDM\">mort<\/reg><\/choice> et vie<\/l>\n                    <l xml:id=\"l-f54v-2-30\"><choice><orig>Quen<\/orig><reg resp=\"#SDM\">Qu'en<\/reg><\/choice> nul des aultres <choice><orig>ceſt<\/orig><reg resp=\"#SDM\">c'est<\/reg><\/choice> la <choice><orig><choice><abbr>ſōme<\/abbr><expan resp=\"#SDM\">ſo<ex>n<\/ex>me<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>sōme<\/abbr><expan resp=\"#SDM\">so<ex>n<\/ex>me<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-31\"><choice><orig>Lannel<\/orig><reg resp=\"#SDM\">L'annel<\/reg><\/choice> <choice><orig>auſſi<\/orig><reg resp=\"#SDM\">aussi<\/reg><\/choice> quie <choice><orig>enuironne<\/orig><reg resp=\"#SDM\">environne<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-32\"><choice><orig>Demonſtre<\/orig><reg resp=\"#SDM\">Demonstre<\/reg><\/choice> <choice><orig>quen<\/orig><reg resp=\"#SDM\">qu'en<\/reg><\/choice> celle maniere<\/l>\n                    <l xml:id=\"l-f54v-2-33\">Doit par <choice><orig>deuant<\/orig><reg resp=\"#SDM\">devant<\/reg><\/choice> et par derriere<\/l>\n                    <l xml:id=\"l-f54v-2-34\"><choice><orig>Deuers<\/orig><reg resp=\"#SDM\">Devers<\/reg><\/choice> <choice><orig>deſtre<\/orig><reg resp=\"#SDM\">destre<\/reg><\/choice> et <choice><orig>deuers<\/orig><reg resp=\"#SDM\">devers<\/reg><\/choice> <choice><orig>ſeneſtre<\/orig><reg resp=\"#SDM\">senestre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-35\">Loyal amant en tous <choice><abbr>tēps<\/abbr><expan resp=\"#SDM\">te<ex>m<\/ex>ps<\/expan><\/choice> <choice><orig>eſtre<\/orig><reg resp=\"#SDM\">estre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-36\">De <choice><orig>pluſeurs<\/orig><reg resp=\"#SDM\">pluseurs<\/reg><\/choice> graces <choice><orig>coꝛonnez<\/orig><reg resp=\"#SDM\">coronnez<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-37\">Et tout entour <choice><orig>enuironnez<\/orig><reg resp=\"#SDM\">environnez<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f54v-2-38\">Et <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> il <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> aulcun qui die<\/l>\n                    <l xml:id=\"l-f54v-2-39\"><choice><orig>Queſtre<\/orig><reg resp=\"#SDM\">Qu'estre<\/reg><\/choice> doit la pierre mucie<\/l>\n                    <pb n=\"55r\" xml:id=\"f55r\"/>\n                    <cb n=\"1\" xml:id=\"cb-f55r-1\"/>\n                    <l xml:id=\"l-f55r-1-1\">Dedans la main <choice><orig>quon<\/orig><reg resp=\"#SDM\">qu'on<\/reg><\/choice> ne la voie<\/l>\n                    <l xml:id=\"l-f55r-1-2\">On leur <choice><orig>peueſt<\/orig><reg resp=\"#SDM\">peuest<\/reg><\/choice> bien par <choice><orig>ceſte<\/orig><reg resp=\"#SDM\">ceste<\/reg><\/choice> voie<\/l>\n                    <l xml:id=\"l-f55r-1-3\"><choice><orig>Aſſez<\/orig><reg resp=\"#SDM\">Assez<\/reg><\/choice> <choice><orig><choice><abbr>ſouffiſēmant<\/abbr><expan resp=\"#SDM\">ſouffiſe<ex>m<\/ex>mant<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>souffisēmant<\/abbr><expan resp=\"#SDM\">souffise<ex>m<\/ex>mant<\/expan><\/choice><\/reg><\/choice> <choice><orig>reſpondꝛe<\/orig><reg resp=\"#SDM\">respondre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-4\">On doit dedans la main <choice><orig>repondꝛe<\/orig><reg resp=\"#SDM\">repondre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-5\">La pierre et ce donne a <choice><orig>entendꝛe<\/orig><reg resp=\"#SDM\">entendre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-6\">Que tous amans doit a ce <choice><orig><choice><abbr>tēdꝛe<\/abbr><expan resp=\"#SDM\">te<ex>n<\/ex>dꝛe<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>tēdre<\/abbr><expan resp=\"#SDM\">te<ex>n<\/ex>dre<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-7\"><choice><orig>Quil<\/orig><reg resp=\"#SDM\">Qu'il<\/reg><\/choice> <choice><orig>puiſt<\/orig><reg resp=\"#SDM\">puist<\/reg><\/choice> <choice><orig>ſon<\/orig><reg resp=\"#SDM\">son<\/reg><\/choice> fait de tous celer<\/l>\n                    <l xml:id=\"l-f55r-1-8\">Sanz riens a aulcun <choice><orig>reueler<\/orig><reg resp=\"#SDM\">reveler<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-9\">Car amour qui bien <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> celee<\/l>\n                    <l xml:id=\"l-f55r-1-10\">Dure plus que la <choice><orig>reuelee<\/orig><reg resp=\"#SDM\">revelee<\/reg><\/choice><\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitblue\" xml:id=\"l-f55r-1-11\">Et <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> <choice><orig>iay<\/orig><reg resp=\"#SDM\">j'ay<\/reg><\/choice> <choice><abbr>longuemāt<\/abbr><expan resp=\"#SDM\">longuema<ex>n<\/ex>t<\/expan><\/choice> <choice><orig>conte<\/orig><reg resp=\"#SDM\">conté<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-12\">De <choice><orig>leſmeraude<\/orig><reg resp=\"#SDM\">l'esmeraude<\/reg><\/choice> la <choice><orig>bonte<\/orig><reg resp=\"#SDM\">bonté<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-13\">Ne vueil <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> par mon <choice><orig><choice><abbr>ſermōner<\/abbr><expan resp=\"#SDM\">ſermo<ex>n<\/ex>ner<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>sermōner<\/abbr><expan resp=\"#SDM\">sermo<ex>n<\/ex>ner<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-14\">Pas fire <choice><orig>quon<\/orig><reg resp=\"#SDM\">qu'on<\/reg><\/choice> ne <choice><orig>puiſt<\/orig><reg resp=\"#SDM\">puist<\/reg><\/choice> donner<\/l>\n                    <l xml:id=\"l-f55r-1-15\">Annel. ou aultre pierre <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> <choice><orig>miſe<\/orig><reg resp=\"#SDM\">mise<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-16\">Car <choice><orig>chaſcun<\/orig><reg resp=\"#SDM\">chascun<\/reg><\/choice> <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> bon a <choice><orig>ſa<\/orig><reg resp=\"#SDM\">sa<\/reg><\/choice> <choice><orig>guiſe<\/orig><reg resp=\"#SDM\">guise<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-17\">Mais <choice><orig>eſmeraude<\/orig><reg resp=\"#SDM\">esmeraude<\/reg><\/choice> et diamans<\/l>\n                    <l xml:id=\"l-f55r-1-18\">Affierent entre les amans<\/l>\n                    <l xml:id=\"l-f55r-1-19\">Mieulx que nulle aultre pierre ou <choice><abbr>mōde<\/abbr><expan resp=\"#SDM\">mo<ex>n<\/ex>de<\/expan><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-20\"><choice><abbr>Tāt<\/abbr><expan resp=\"#SDM\">Ta<ex>n<\/ex>t<\/expan><\/choice> <choice><orig>ſoit<\/orig><reg resp=\"#SDM\">soit<\/reg><\/choice> belle gente et ronde<\/l>\n                    <l xml:id=\"l-f55r-1-21\">Si com tu as <choice><orig>ia<\/orig><reg resp=\"#SDM\">ja<\/reg><\/choice> bien veu<\/l>\n                    <l xml:id=\"l-f55r-1-22\">De <choice><orig>leſmeraude<\/orig><reg resp=\"#SDM\">l'esmeraude<\/reg><\/choice> et apperceu<\/l>\n                    <l xml:id=\"l-f55r-1-23\">Si te dirai du diamant<\/l>\n                    <l xml:id=\"l-f55r-1-24\">Pour quoy il affiert <choice><orig>alamant<\/orig><reg resp=\"#SDM\">a l'amant<\/reg><\/choice><\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitgold\" xml:id=\"l-f55r-1-25\">Dyamant <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> <choice><orig>indiuiſibles<\/orig><reg resp=\"#SDM\">indivisibles<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f55r-1-2  resp=\"#SDM\">est<\/reg><\/choice> <choice><orig>ainſi<\/orig><reg resp=\"#SDM\">ainsi<\/reg><\/choice> <choice><orig>deſeſpoir<\/orig><reg resp=\"#SDM\">desespoir<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-2\">De <choice><orig>ioie<\/orig><reg resp=\"#SDM\">joie<\/reg><\/choice> <choice><orig>auoir<\/orig><reg resp=\"#SDM\">avoir<\/reg><\/choice> <choice><orig>ſui<\/orig><reg resp=\"#SDM\">sui<\/reg><\/choice> <choice><orig>hoꝛs<\/orig><reg resp=\"#SDM\">hors<\/reg><\/choice> boutez<\/l>\n                    <l xml:id=\"l-f58r-2-3\">Mais par amours ne me boutez<\/l>\n                    <l xml:id=\"l-f58r-2-4\">Dame de <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig>crueuſe<\/orig><reg resp=\"#SDM\">crueuse<\/reg><\/choice> lance<\/l>\n                    <l xml:id=\"l-f58r-2-5\">Que plus de maulx <choice><abbr>q՚<\/abbr><expan resp=\"#SDM\">q<ex>ue<\/ex><\/expan><\/choice> <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> me lance<\/l>\n                    <l xml:id=\"l-f58r-2-6\">Car contraire <choice><orig>meſt<\/orig><reg resp=\"#SDM\">m'est<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig>foꝛtune<\/orig><reg resp=\"#SDM\">fortune<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-7\">Que <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> croy <choice><orig>conques<\/orig><reg resp=\"#SDM\">c'onques<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig>foꝛt<\/orig><reg resp=\"#SDM\">fort<\/reg><\/choice> <choice><orig>vne<\/orig><reg resp=\"#SDM\">une<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-8\">Foiz. ne fu a nul ennemie<\/l>\n                    <l xml:id=\"l-f58r-2-9\"><choice><abbr>Cōme<\/abbr><expan resp=\"#SDM\">Co<ex>m<\/ex>me<\/expan><\/choice> a moy <choice><orig>eſtes<\/orig><reg resp=\"#SDM\">estes<\/reg><\/choice> ennemie<\/l>\n                    <l xml:id=\"l-f58r-2-10\">Car de riens ne me <choice><orig>ſens<\/orig><reg resp=\"#SDM\">sens<\/reg><\/choice> meffait<\/l>\n                    <l xml:id=\"l-f58r-2-11\">Pour <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice> que <choice><orig>iaye<\/orig><reg resp=\"#SDM\">j'aye<\/reg><\/choice> meffait<\/l>\n                    <l xml:id=\"l-f58r-2-12\">Vers amours <choice><orig>ia<\/orig><reg resp=\"#SDM\">ja<\/reg><\/choice> <choice><orig>ny<\/orig><reg resp=\"#SDM\">n'y<\/reg><\/choice> ferai <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-13\">De quoy loyal amant me <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-14\">Si me getez de ces peris<\/l>\n                    <l xml:id=\"l-f58r-2-15\">Car <choice><orig>tantoſt<\/orig><reg resp=\"#SDM\">tantost<\/reg><\/choice> <choice><orig>ſeroie<\/orig><reg resp=\"#SDM\">seroie<\/reg><\/choice> peris<\/l>\n                    <l xml:id=\"l-f58r-2-16\">Se longuemant telz maulz <choice><orig>auoie<\/orig><reg resp=\"#SDM\">avoie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-17\">Mais <choice><orig>eſperance<\/orig><reg resp=\"#SDM\">esperance<\/reg><\/choice> qui <choice><orig>auoie<\/orig><reg resp=\"#SDM\">avoie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-18\">Les <choice><orig>vꝛais<\/orig><reg resp=\"#SDM\">vrais<\/reg><\/choice> amans me fait <choice><orig><choice><abbr>pēſer<\/abbr><expan resp=\"#SDM\">pe<ex>n<\/ex>ſer<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>pēser<\/abbr><expan resp=\"#SDM\">pe<ex>n<\/ex>ser<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-19\">Car puis <choice><orig>quen<\/orig><reg resp=\"#SDM\">qu'en<\/reg><\/choice> <choice><abbr>voꝰ<\/abbr><expan resp=\"#SDM\">vo<ex>us<\/ex><\/expan><\/choice> <choice><orig>ſont<\/orig><reg resp=\"#SDM\">sont<\/reg><\/choice> my <choice><orig>penſer<\/orig><reg resp=\"#SDM\">penser<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-20\">Du tout en tout <choice><orig>ſanz<\/orig><reg resp=\"#SDM\">sanz<\/reg><\/choice> <choice><orig>deceuoir<\/orig><reg resp=\"#SDM\">decevoir<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-21\">Se <choice><orig>oꝛ<\/orig><reg resp=\"#SDM\">or<\/reg><\/choice> en ay mal de puis que voir<\/l>\n                    <l xml:id=\"l-f58r-2-22\">En aulcun <choice><abbr>tēps<\/abbr><expan resp=\"#SDM\">te<ex>m<\/ex>ps<\/expan><\/choice> aurai de <choice><orig>poꝛt<\/orig><reg resp=\"#SDM\">port<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-23\">En ce <choice><abbr>ml՚t<\/abbr><expan resp=\"#SDM\">m<ex>ou<\/ex>lt<\/expan><\/choice> <choice><orig>ſouuant<\/orig><reg resp=\"#SDM\">souvant<\/reg><\/choice> me <choice><orig>depoꝛt<\/orig><reg resp=\"#SDM\">deport<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-24\">En ce que mon temps y emploie<\/l>\n                    <l xml:id=\"l-f58r-2-25\">Tel com bon amour y emploie<\/l>\n                    <l xml:id=\"l-f58r-2-26\"><choice><orig>Iuſqua<\/orig><reg resp=\"#SDM\">Jusqu'a<\/reg><\/choice> tant que ma vie fine<\/l>\n                    <l xml:id=\"l-f58r-2-27\"><choice><abbr>Cōme<\/abbr><expan resp=\"#SDM\">Co<ex>m<\/ex>me<\/expan><\/choice> cilz <choice><orig>quenuis<\/orig><reg resp=\"#SDM\">qu'envis<\/reg><\/choice> en define<\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitgold\" xml:id=\"l-f58r-2-28\"><choice><abbr>Quāt<\/abbr><expan resp=\"#SDM\">Qua<ex>n<\/ex>t<\/expan><\/choice> li diex <choice><orig>mot<\/orig><reg resp=\"#SDM\">m'ot<\/reg><\/choice> ce dit <choice><orig><choice><abbr>dōne<\/abbr><expan resp=\"#SDM\">do<ex>n<\/ex>ne<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>dōné<\/abbr><expan resp=\"#SDM\">do<ex>n<\/ex>né<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-29\">Il <choice><orig>ma<\/orig><reg resp=\"#SDM\">m'a<\/reg><\/choice> <choice><orig>ainſi<\/orig><reg resp=\"#SDM\">ainsi<\/reg><\/choice> <choice><orig>arraiſonne<\/orig><reg resp=\"#SDM\">arraisonné<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-30\">Amis que me diras tu <choice><orig>oꝛes<\/orig><reg resp=\"#SDM\">ores<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-31\">As tu <choice><abbr>tāt<\/abbr><expan resp=\"#SDM\">ta<ex>n<\/ex>t<\/expan><\/choice> hardemant <choice><orig>encoꝛes<\/orig><reg resp=\"#SDM\">encores<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-32\"><choice><orig>Qua<\/orig><reg resp=\"#SDM\">Qu'a<\/reg><\/choice> ta dame bailler <choice><orig>oſaſſes<\/orig><reg resp=\"#SDM\">osasses<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-33\"><choice><orig>Ceſt<\/orig><reg resp=\"#SDM\">C'est<\/reg><\/choice> <choice><orig>eſcript<\/orig><reg resp=\"#SDM\">escript<\/reg><\/choice> ou lui <choice><orig>enuoiaſſes<\/orig><reg resp=\"#SDM\">envoiasses<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-34\"><choice><orig>Sen<\/orig><reg resp=\"#SDM\">S'en<\/reg><\/choice> toy tant hardemant <choice><orig>nas<\/orig><reg resp=\"#SDM\">n'as<\/reg><\/choice> mie<\/l>\n                    <l xml:id=\"l-f58r-2-35\">Au moins a <choice><orig>vne<\/orig><reg resp=\"#SDM\">une<\/reg><\/choice><choice><orig>ſienne<\/orig><reg resp=\"#SDM\">sienne<\/reg><\/choice> amie<\/l>\n                    <l xml:id=\"l-f58r-2-36\">Les dois bailler <choice><abbr>cōmāt<\/abbr><expan resp=\"#SDM\">co<ex>m<\/ex>ma<ex>n<\/ex>t<\/expan><\/choice> <choice><orig>quil<\/orig><reg resp=\"#SDM\">qu'il<\/reg><\/choice> aille<\/l>\n                    <l xml:id=\"l-f58r-2-37\">Qui a certaine heure lui baille<\/l>\n                    <l xml:id=\"l-f58r-2-38\">Ou qui par <choice><orig>deuant<\/orig><reg resp=\"#SDM\">devant<\/reg><\/choice> li le <choice><orig>liſe<\/orig><reg resp=\"#SDM\">lise<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58r-2-39\">Et lui die cilz qui <choice><orig>na<\/orig><reg resp=\"#SDM\">n'a<\/reg><\/choice> mas <choice><orig>miſe<\/orig><reg resp=\"#SDM\">mise<\/reg><\/choice><\/l>\n                    <pb n=\"58v\" xml:id=\"f58v\"/>\n                    <cb n=\"1\" xml:id=\"cb-f58v-1\"/>\n                    <l xml:id=\"l-f58v-1-1\"><choice><orig>Sentention<\/orig><reg resp=\"#SDM\">S'entention<\/reg><\/choice> a faire bourdes<\/l>\n                    <l xml:id=\"l-f58v-1-2\">Qui ce ditt <choice><orig>fiſt<\/orig><reg resp=\"#SDM\">fist<\/reg><\/choice> ne en falourdes<\/l>\n                    <l xml:id=\"l-f58v-1-3\">Si croy <choice><orig>quil<\/orig><reg resp=\"#SDM\">qu'il<\/reg><\/choice> <choice><orig>naime<\/orig><reg resp=\"#SDM\">n'aime<\/reg><\/choice> pas des coutes<\/l>\n                    <l xml:id=\"l-f58v-1-4\">Ains a mis <choice><orig>ſes<\/orig><reg resp=\"#SDM\">ses<\/reg><\/choice> <choice><orig>penſees<\/orig><reg resp=\"#SDM\">pensees<\/reg><\/choice> toutes<\/l>\n                    <l xml:id=\"l-f58v-1-5\">A amer a mon <choice><orig>eſciant<\/orig><reg resp=\"#SDM\">esciant<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-6\">Nil ne <choice><orig>fiſt<\/orig><reg resp=\"#SDM\">fist<\/reg><\/choice> onques pour niant<\/l>\n                    <l xml:id=\"l-f58v-1-7\">Ce <choice><orig>dittie<\/orig><reg resp=\"#SDM\">dittié<\/reg><\/choice>. et <choice><orig>ſaichiez<\/orig><reg resp=\"#SDM\">saichiez<\/reg><\/choice> de voir<\/l>\n                    <l xml:id=\"l-f58v-1-8\"><choice><orig>Quil<\/orig><reg resp=\"#SDM\">Qu'il<\/reg><\/choice> <choice><orig>nayme<\/orig><reg resp=\"#SDM\">n'ayme<\/reg><\/choice> pas pour <choice><orig>deceuoir<\/orig><reg resp=\"#SDM\">decevoir<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-9\">Nil <choice><orig>nen<\/orig><reg resp=\"#SDM\">n'en<\/reg><\/choice> a mie le renom<\/l>\n                    <l xml:id=\"l-f58v-1-10\"><choice><orig>Loꝛs<\/orig><reg resp=\"#SDM\">Lors<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> pourra dire le nom<\/l>\n                    <l xml:id=\"l-f58v-1-11\">De qyoy cilz pourra bien <choice><orig><choice><abbr>entēdꝛe<\/abbr><expan resp=\"#SDM\">ente<ex>n<\/ex>dꝛe<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>entēdre<\/abbr><expan resp=\"#SDM\">ente<ex>n<\/ex>dre<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-12\">Que faire le te fait <choice><orig>empꝛendꝛe<\/orig><reg resp=\"#SDM\">emprendre<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-13\">Amours qui <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig><choice><abbr>foꝛmāt<\/abbr><expan resp=\"#SDM\">foꝛma<ex>n<\/ex>t<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>formāt<\/abbr><expan resp=\"#SDM\">forma<ex>n<\/ex>t<\/expan><\/choice><\/reg><\/choice> te <choice><orig>pꝛeſſe<\/orig><reg resp=\"#SDM\">presse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-14\">Que de <choice><orig>iour<\/orig><reg resp=\"#SDM\">jour<\/reg><\/choice> ne de nuyt ne <choice><orig>ceſſe<\/orig><reg resp=\"#SDM\">cesse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-15\">Et pour ce pourra bien <choice><orig>penſer<\/orig><reg resp=\"#SDM\">penser<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-16\">Que de ce mal te <choice><orig>peueſt<\/orig><reg resp=\"#SDM\">peuest<\/reg><\/choice> <choice><orig>tenſer<\/orig><reg resp=\"#SDM\">tenser<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-17\">Et <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> bien <choice><orig>ſauoit<\/orig><reg resp=\"#SDM\">savoit<\/reg><\/choice> ton couraige<\/l>\n                    <l xml:id=\"l-f58v-1-18\"><choice><orig>Ia<\/orig><reg resp=\"#SDM\">Ja<\/reg><\/choice> ne te <choice><orig>ſeroit<\/orig><reg resp=\"#SDM\">seroit<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig>ſauuaige<\/orig><reg resp=\"#SDM\">sauvaige<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-19\">La bele <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> le cuer a fin<\/l>\n                    <l xml:id=\"l-f58v-1-20\">Que mieulx ne <choice><orig>ten<\/orig><reg resp=\"#SDM\">t'en<\/reg><\/choice> <choice><orig>feuſt<\/orig><reg resp=\"#SDM\">feust<\/reg><\/choice> en la fin<\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitblue\" xml:id=\"l-f58v-1-21\"><choice><orig>Ie<\/orig><reg resp=\"#SDM\">Je<\/reg><\/choice> lui dis <choice><orig>quainſi<\/orig><reg resp=\"#SDM\">qu'ainsi<\/reg><\/choice> le feroie<\/l>\n                    <l xml:id=\"l-f58v-1-22\"><choice><abbr>Ml՚t<\/abbr><expan resp=\"#SDM\">M<ex>ou<\/ex>lt<\/expan><\/choice> tres voulentiers <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> <choice><orig>ioſoie<\/orig><reg resp=\"#SDM\">j'osoie<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-23\">Mais en mon cuer <choice><abbr>tāt<\/abbr><expan resp=\"#SDM\">ta<ex>n<\/ex>t<\/expan><\/choice> ne <choice><orig>ſens<\/orig><reg resp=\"#SDM\">sens<\/reg><\/choice> mie<\/l>\n                    <l xml:id=\"l-f58v-1-24\">De hardemant que <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> lui die<\/l>\n                    <l xml:id=\"l-f58v-1-25\">Ne <choice><orig>qua<\/orig><reg resp=\"#SDM\">qu'a<\/reg><\/choice> aultre <choice><orig>ſauoir<\/orig><reg resp=\"#SDM\">savoir<\/reg><\/choice> le face<\/l>\n                    <l xml:id=\"l-f58v-1-26\">Que en ce <choice><orig>faiſant<\/orig><reg resp=\"#SDM\">faisant<\/reg><\/choice> ne mefface<\/l>\n                    <l xml:id=\"l-f58v-1-27\">Celer la doy <choice><orig>ſe<\/orig><reg resp=\"#SDM\">se<\/reg><\/choice> <choice><orig>ſouuenir<\/orig><reg resp=\"#SDM\">souvenir<\/reg><\/choice> veu<\/l>\n                    <l xml:id=\"l-f58v-1-28\">Pour <choice><orig>meſdiſens<\/orig><reg resp=\"#SDM\">mesdisens<\/reg><\/choice> <choice><abbr>q՚<\/abbr><expan resp=\"#SDM\">q<ex>ue<\/ex><\/expan><\/choice> li mien veu<\/l>\n                    <l xml:id=\"l-f58v-1-29\">Matiere de <choice><orig>meſdire<\/orig><reg resp=\"#SDM\">mesdire<\/reg><\/choice> auroient<\/l>\n                    <l xml:id=\"l-f58v-1-30\">Se ilz de riens <choice><orig>apperceuoient<\/orig><reg resp=\"#SDM\">appercevoient<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-31\">Que aulcune <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice> dicte <choice><orig>euſſe<\/orig><reg resp=\"#SDM\">eusse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-32\">Que celer et taire <choice><orig>deuſſe<\/orig><reg resp=\"#SDM\">deusse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-33\">Si aims mieulx <choice><orig><choice><abbr>aīſi<\/abbr><expan resp=\"#SDM\">ai<ex>n<\/ex>ſi<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>aīsi<\/abbr><expan resp=\"#SDM\">ai<ex>n<\/ex>si<\/expan><\/choice><\/reg><\/choice> <choice><abbr>mō<\/abbr><expan resp=\"#SDM\">mo<ex>n<\/ex><\/expan><\/choice> <choice><abbr>tēps<\/abbr><expan resp=\"#SDM\">te<ex>m<\/ex>ps<\/expan><\/choice> <choice><orig>vſer<\/orig><reg resp=\"#SDM\">user<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-34\">Que moy <choice><abbr>ꝑ<\/abbr><expan resp=\"#SDM\">p<ex>ar<\/ex><\/expan><\/choice> <choice><orig>iangle<\/orig><reg resp=\"#SDM\">jangle<\/reg><\/choice> <choice><orig>accuſer<\/orig><reg resp=\"#SDM\">accuser<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-35\">A tel de quoy piz me <choice><orig>veniſt<\/orig><reg resp=\"#SDM\">venist<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-36\">Car de <choice><orig>iangler<\/orig><reg resp=\"#SDM\">jangler<\/reg><\/choice> nul <choice><abbr>biē<\/abbr><expan resp=\"#SDM\">bie<ex>n<\/ex><\/expan><\/choice> <choice><orig>nen<\/orig><reg resp=\"#SDM\">n'en<\/reg><\/choice> <choice><orig>iſt<\/orig><reg resp=\"#SDM\">ist<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-37\">Si <choice><orig>attendꝛai<\/orig><reg resp=\"#SDM\">attendrai<\/reg><\/choice> merci <choice><orig>ainſi<\/orig><reg resp=\"#SDM\">ainsi<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-38\">De la panthere que <choice><orig>iaim<\/orig><reg resp=\"#SDM\">j'aim<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-1-39\">Que <choice><orig>delle<\/orig><reg resp=\"#SDM\">d'elle<\/reg><\/choice> ne me puis retraire<\/l>\n                    <cb n=\"2\" xml:id=\"cb-f58v-2\"/>\n                    <l xml:id=\"l-f58v-2-1\">Car aultre <choice><orig>choſe<\/orig><reg resp=\"#SDM\">chose<\/reg><\/choice> <choice><orig>nen<\/orig><reg resp=\"#SDM\">n'en<\/reg><\/choice> puis faire<\/l>\n                <\/lg>\n\n                <lg>\n                    <l rend=\"decoratedInitial decoInitgold\" xml:id=\"l-f58v-2-2\">Li dieux <choice><orig>diſt<\/orig><reg resp=\"#SDM\">dist<\/reg><\/choice> aultre <choice><orig><choice><abbr>cōſeil<\/abbr><expan resp=\"#SDM\">co<ex>n<\/ex>ſeil<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>cōseil<\/abbr><expan resp=\"#SDM\">co<ex>n<\/ex>seil<\/expan><\/choice><\/reg><\/choice> <choice><orig><choice><abbr>pꝛēdꝛe<\/abbr><expan resp=\"#SDM\">pꝛe<ex>n<\/ex>dꝛe<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>prēdre<\/abbr><expan resp=\"#SDM\">pre<ex>n<\/ex>dre<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-3\">Te <choice><orig>couuient<\/orig><reg resp=\"#SDM\">couvient<\/reg><\/choice> et ailleurs <choice><orig><choice><abbr>entēdꝛe<\/abbr><expan resp=\"#SDM\">ente<ex>n<\/ex>dꝛe<\/expan><\/choice><\/orig><reg resp=\"#SDM\"><choice><abbr>entēdre<\/abbr><expan resp=\"#SDM\">ente<ex>n<\/ex>dre<\/expan><\/choice><\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-4\">Et tout aultre voie tenir<\/l>\n                    <l xml:id=\"l-f58v-2-5\">Se tu veulz a merci venir<\/l>\n                    <l xml:id=\"l-f58v-2-6\">Et <choice><orig>puiſque<\/orig><reg resp=\"#SDM\">puisque<\/reg><\/choice> tu as <choice><orig>refuſees<\/orig><reg resp=\"#SDM\">refusees<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-7\">Les voies que <choice><orig>ie<\/orig><reg resp=\"#SDM\">je<\/reg><\/choice> <choice><orig>tay<\/orig><reg resp=\"#SDM\">t'ay<\/reg><\/choice> <choice><orig>monſtrees<\/orig><reg resp=\"#SDM\">monstrees<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-8\"><choice><orig>Ie<\/orig><reg resp=\"#SDM\">Je<\/reg><\/choice> <choice><orig>ny<\/orig><reg resp=\"#SDM\">n'y<\/reg><\/choice> <choice><orig>ſcay<\/orig><reg resp=\"#SDM\">scay<\/reg><\/choice> plus voie neiz <choice><orig>vne<\/orig><reg resp=\"#SDM\">une<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-9\"><choice><orig>Ffoꝛs<\/orig><reg resp=\"#SDM\">Fors<\/reg><\/choice> que la voie de <choice><orig>foꝛtune<\/orig><reg resp=\"#SDM\">fortune<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-10\">Et celle voie <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> trop <choice><orig>doubteuſe<\/orig><reg resp=\"#SDM\">doubteuse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-11\">A tenir. et trop <choice><orig>perilleuſe<\/orig><reg resp=\"#SDM\">perilleuse<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-12\">Car <choice><orig>foꝛtune<\/orig><reg resp=\"#SDM\">fortune<\/reg><\/choice> <choice><orig>ſi<\/orig><reg resp=\"#SDM\">si<\/reg><\/choice> <choice><orig>eſt<\/orig><reg resp=\"#SDM\">est<\/reg><\/choice> trop dure<\/l>\n                    <l xml:id=\"l-f58v-2-13\">A la foiz et <choice><orig>triſte<\/orig><reg resp=\"#SDM\">triste<\/reg><\/choice> et <choice><orig>obſcure<\/orig><reg resp=\"#SDM\">obscure<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-14\"><choice><orig>Ffellonneuſſe<\/orig><reg resp=\"#SDM\">Fellonneusse<\/reg><\/choice>. <choice><orig>oꝛgueilleuſe<\/orig><reg resp=\"#SDM\">orgueilleuse<\/reg><\/choice> <choice><abbr>⁊<\/abbr><expan resp=\"#SDM\"><ex>et<\/ex><\/expan><\/choice> fiere<\/l>\n                    <l xml:id=\"l-f58v-2-15\">Et a la foiz <choice><orig>daultre<\/orig><reg resp=\"#SDM\">d'aultre<\/reg><\/choice> maniere<\/l>\n                    <l xml:id=\"l-f58v-2-16\">Large <choice><orig>courtoiſe<\/orig><reg resp=\"#SDM\">courtoise<\/reg><\/choice> et accueillant<\/l>\n                    <l xml:id=\"l-f58v-2-17\">Doulce <choice><orig>piteuſe<\/orig><reg resp=\"#SDM\">piteuse<\/reg><\/choice> et bien <choice><abbr>vueillāt<\/abbr><expan resp=\"#SDM\">vueilla<ex>n<\/ex>t<\/expan><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-18\">Puiz que les voies que <choice><orig>iay<\/orig><reg resp=\"#SDM\">j'ay<\/reg><\/choice> dites<\/l>\n                    <l xml:id=\"l-f58v-2-19\">Ne veulz tenir <choice><orig>ſen<\/orig><reg resp=\"#SDM\">s'en<\/reg><\/choice> <choice><orig>ſoies<\/orig><reg resp=\"#SDM\">soies<\/reg><\/choice> quites<\/l>\n                    <l xml:id=\"l-f58v-2-20\">Si <choice><orig>pꝛen<\/orig><reg resp=\"#SDM\">pren<\/reg><\/choice> de <choice><orig>foꝛtune<\/orig><reg resp=\"#SDM\">fortune<\/reg><\/choice> la voie<\/l>\n                    <l xml:id=\"l-f58v-2-21\"><choice><orig>Ces<\/orig><reg resp=\"#SDM\">C'es<\/reg><\/choice> li plus beaulx tours <choice><abbr>q՚<\/abbr><expan resp=\"#SDM\">q<ex>ue<\/ex><\/expan><\/choice> <choice><orig>iei<\/orig><reg resp=\"#SDM\">j'ei<\/reg><\/choice> voie<\/l>\n                    <l xml:id=\"l-f58v-2-22\">Car tant ne te <choice><orig>ſauras<\/orig><reg resp=\"#SDM\">sauras<\/reg><\/choice> <choice><orig>laſſer<\/orig><reg resp=\"#SDM\">lasser<\/reg><\/choice><\/l>\n                    <l xml:id=\"l-f58v-2-23\">Que <c   function walkNodes(childNodes) {
    const elements  = Array.from(childNodes).filter(n => n.nodeType === Node.ELEMENT_NODE);
    let prevWasLg = false;
    for (const el of elements) {
      const tag = el.localName;
      if (tag === "pb") {
        flushSide();
        currentPbN   = el.getAttribute("n")      || "";
        currentPbId  = el.getAttribute("xml:id") || "";
        currentItems = [];
        prevWasLg = false;
      } else if (tag === "lg") {
        if (prevWasLg) currentItems.push({ type: "lg" });
        walkNodes(el.childNodes);
        prevWasLg = true;
      } else if (tag === "cb") {
        currentItems.push({ type: "cb", n: el.getAttribute("n") || "", xmlId: el.getAttribute("xml:id") || "" });
        prevWasLg = false;
      } else if (tag === "l") {
        currentItems.push({ type: "l", xmlId: el.getAttribute("xml:id") || "", rend: el.getAttribute("rend") || "", segments: parseLineContent(el) });
        prevWasLg = false;
      } else if (tag === "p") {
        currentItems.push({ type: "p", xmlId: el.getAttribute("xml:id") || "", rend: el.getAttribute("rend") || "", segments: parseLineContent(el) });
        prevWasLg = false;
      }
    }
  }

  walkNodes(body.childNodes);
  flushSide();
  return sides;
}

/* =============================================================
   CHIP RENDERING  (read-only; mirrors rebuildEditorContent logic)
   ============================================================= */
function buildSegmentChips(segments, container) {
  for (const seg of segments) {
    if (seg.type === "text") {
      // Split on embedded LB markers (rare in text segments but handle gracefully)
      const parts = seg.content.split(/([\uE001\uE002])/);
      for (const part of parts) {
        if (part === LB_MARK) {
          const sp = document.createElement("span");
          sp.className = "tok-lb";
          sp.textContent = "↵";
          container.appendChild(sp);
        } else if (part === LB_HARD_MARK) {
          const sp = document.createElement("span");
          sp.className = "tok-lb tok-lb-hard";
          sp.textContent = "↵!";
          container.appendChild(sp);
        } else if (part) {
          container.appendChild(document.createTextNode(part));
        }
      }
    } else if (seg.type === "lb") {
      const sp = document.createElement("span");
      sp.className = seg.breakNo ? "tok-lb tok-lb-hard" : "tok-lb";
      sp.textContent = seg.breakNo ? "↵!" : "↵";
      container.appendChild(sp);
    } else if (seg.type === "cb-inline") {
      const sp = document.createElement("span");
      sp.className = "tok-cb-inline";
      sp.textContent = `⊞${seg.n ? ` col:${seg.n}` : ""}`;
      container.appendChild(sp);
    } else if (seg.type === "pb-inline") {
      const sp = document.createElement("span");
      sp.className = "tok-pb-inline";
      sp.textContent = `☐${seg.n ? ` ${seg.n}` : ""}`;
      container.appendChild(sp);
    } else if (seg.type === "abbr") {
      const sp = document.createElement("span");
      sp.className = "tok-abbr";
      sp.textContent = showExpanVariant ? displayChipText(seg.expan) : displayChipText(seg.abbr);
      sp.setAttribute("data-tip", `abbr: ${displayChipText(seg.abbr)}\nexpan: ${displayChipText(seg.expan)}`);
      container.appendChild(sp);
    } else if (seg.type === "orig") {
      const sp = document.createElement("span");
      sp.className = "tok-orig";
      sp.textContent = showRegVariant ? displayChipText(seg.reg) : displayChipText(seg.orig);
      sp.setAttribute("data-tip", `orig: ${displayChipText(seg.orig)}\nreg:  ${displayChipText(seg.reg)}`);
      container.appendChild(sp);
    } else if (seg.type === "orig-abbr") {
      const sp = document.createElement("span");
      sp.className = "tok-abbr tok-orig";
      sp.textContent = showRegVariant
        ? (showExpanVariant ? displayChipText(seg.reg_expan)  : displayChipText(seg.reg_abbr))
        : (showExpanVariant ? displayChipText(seg.orig_expan) : displayChipText(seg.orig_abbr));
      sp.setAttribute("data-tip",
        `orig: ${displayChipText(seg.orig_abbr)} → ${displayChipText(seg.orig_expan)}\nreg:  ${displayChipText(seg.reg_abbr)} → ${displayChipText(seg.reg_expan)}`);
      container.appendChild(sp);
    }
  }
}

/* =============================================================
   VIEWER RENDERING
   ============================================================= */

// Build a single verse-line or paragraph row.
// counter is a shared object { n: Number } incremented here for continuous numbering.
function buildItemRow(item, counter) {
  const isP  = item.type === "p";
  const row  = document.createElement("div");
  row.className = isP ? "para-item" : "verse-line";
  if (item.rend) row.dataset.rend = item.rend;

  // Continuous sequential line number
  counter.n++;
  const numSpan = document.createElement("span");
  numSpan.className = "line-num";
  numSpan.textContent = String(counter.n);
  row.appendChild(numSpan);

  // Text with chips
  const bodySpan = document.createElement("span");
  bodySpan.className = "line-body";
  buildSegmentChips(item.segments, bodySpan);
  row.appendChild(bodySpan);

  return row;
}

// Build one folio-side section (pb + items).
// counter is a shared { n: Number } object for continuous line numbering.
function buildFolioSection(side, counter) {
  const hasLines = side.items.some(it => it.type === "l" || it.type === "p");
  if (!hasLines && !side.pb.n) return null;

  const sec = document.createElement("div");
  sec.className = "folio-section";

  // Folio header (title only — xmlid removed per request)
  if (side.pb.n) {
    const hdr = document.createElement("div");
    hdr.className = "folio-header";
    const title = document.createElement("span");
    title.className = "folio-title";
    title.textContent = `f.\u202F${side.pb.n}`;
    hdr.appendChild(title);
    sec.appendChild(hdr);
  }

  // Items
  const body = document.createElement("div");
  body.className = "folio-body";

  for (const item of side.items) {
    if (item.type === "cb") {
      const row = document.createElement("div");
      row.className = "col-break-row";
      const lbl = document.createElement("span");
      lbl.className = "col-break-label";
      lbl.textContent = item.n ? `Column\u00a0${item.n}` : "Column break";
      row.appendChild(lbl);
      body.appendChild(row);
    } else if (item.type === "lg") {
      const row = document.createElement("div");
      row.className = "stanza-break";
      body.appendChild(row);
    } else if (item.type === "l" || item.type === "p") {
      body.appendChild(buildItemRow(item, counter));
    }
  }

  sec.appendChild(body);
  return sec;
}

// (Re-)render the entire viewer from allSides.
let allSides = [];

function renderViewer() {
  const cont = document.getElementById("viewer-content");
  cont.innerHTML = "";
  const counter = { n: 0 };  // shared counter resets on each full render
  for (const side of allSides) {
    const sec = buildFolioSection(side, counter);
    if (sec) cont.appendChild(sec);
  }
}

function lineTextFromSegments(segments, ctx) {
  const toVisibleText = (s) => String(s || "").replace(/[\uE001\uE002]/g, "\n");
  const marker = (folio, colN) => {
    const fol = String(folio || "").trim();
    const rawCol = String(colN || "").trim();
    let col = "";
    if (rawCol === "1") col = "a";
    else if (rawCol === "2") col = "b";
    else if (/^[ab]$/i.test(rawCol)) col = rawCol.toLowerCase();
    else if (rawCol) col = rawCol.toLowerCase();
    return `[f${fol}${col}]`;
  };

  let out = "";
  for (const seg of segments) {
    if (seg.type === "text") {
      out += toVisibleText(seg.content);
    } else if (seg.type === "lb") {
      out += "\n";
    } else if (seg.type === "abbr") {
      out += showExpanVariant ? toVisibleText(seg.expan) : toVisibleText(seg.abbr);
    } else if (seg.type === "orig") {
      out += showRegVariant ? toVisibleText(seg.reg) : toVisibleText(seg.orig);
    } else if (seg.type === "orig-abbr") {
      out += showRegVariant
        ? (showExpanVariant ? toVisibleText(seg.reg_expan) : toVisibleText(seg.reg_abbr))
        : (showExpanVariant ? toVisibleText(seg.orig_expan) : toVisibleText(seg.orig_abbr));
    } else if (seg.type === "cb-inline") {
      ctx.col = seg.n || "";
      out += `\n${marker(ctx.folio, ctx.col)}\n`;
    } else if (seg.type === "pb-inline") {
      ctx.folio = seg.n || ctx.folio;
      ctx.col = "";
      out += `\n${marker(ctx.folio, ctx.col)}\n`;
    }
  }
  return out;
}

function buildExportText() {
  const marker = (folio, colN) => {
    const fol = String(folio || "").trim();
    const rawCol = String(colN || "").trim();
    let col = "";
    if (rawCol === "1") col = "a";
    else if (rawCol === "2") col = "b";
    else if (/^[ab]$/i.test(rawCol)) col = rawCol.toLowerCase();
    else if (rawCol) col = rawCol.toLowerCase();
    return `[f${fol}${col}]`;
  };

  const lines = [];
  let activeFolio = "";

  for (const side of allSides) {
    if (side.pb && side.pb.n) activeFolio = side.pb.n;

    let activeCol = "";
    let sideStarted = false;
    for (const item of side.items) {
      if (item.type === "cb") {
        activeCol = item.n || "";
        lines.push(marker(activeFolio, activeCol));
        sideStarted = true;
      } else if (item.type === "l" || item.type === "p") {
        if (!sideStarted) {
          lines.push(marker(activeFolio, activeCol));
          sideStarted = true;
        }
        const ctx = { folio: activeFolio, col: activeCol };
        lines.push(lineTextFromSegments(item.segments, ctx));
        activeFolio = ctx.folio;
        activeCol = ctx.col;
      } else if (item.type === "lg") {
        lines.push("");
      }
    }
  }

  const body = lines.join("\n");
  return body
    .replace(/\n{3,}/g, "\n\n")
    .replace(/^\n+/, "")
    .replace(/\n+$/, "") + "\n";
}

function downloadCurrentText() {
  const txt = buildExportText();
  const modeOrth = showRegVariant ? "reg" : "orig";
  const modeAbbr = showExpanVariant ? "expan" : "abbr";
  const slug = "Saint Petersburg, NLR, Fr.Q.v.XIV.3"
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "") || "transcription";
  const date = new Date().toISOString().slice(0, 10);
  const filename = `${slug}_${modeOrth}_${modeAbbr}_${date}.txt`;

  const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* =============================================================
   SWITCH HANDLERS
   ============================================================= */
document.getElementById("sw-orig").addEventListener("click", () => {
  if (showRegVariant) {
    showRegVariant = false;
    document.getElementById("sw-orig").classList.add("active");
    document.getElementById("sw-reg").classList.remove("active");
    renderViewer();
  }
});
document.getElementById("sw-reg").addEventListener("click", () => {
  if (!showRegVariant) {
    showRegVariant = true;
    document.getElementById("sw-reg").classList.add("active");
    document.getElementById("sw-orig").classList.remove("active");
    renderViewer();
  }
});
document.getElementById("sw-abbr").addEventListener("click", () => {
  if (showExpanVariant) {
    showExpanVariant = false;
    document.getElementById("sw-abbr").classList.add("active");
    document.getElementById("sw-expan").classList.remove("active");
    renderViewer();
  }
});
document.getElementById("sw-expan").addEventListener("click", () => {
  if (!showExpanVariant) {
    showExpanVariant = true;
    document.getElementById("sw-expan").classList.add("active");
    document.getElementById("sw-abbr").classList.remove("active");
    renderViewer();
  }
});
document.getElementById("btn-download-txt").addEventListener("click", downloadCurrentText);

/* =============================================================
   INIT
   ============================================================= */
// Show generation timestamp
if (GENERATED_ISO) {
  try {
    const d = new Date(GENERATED_ISO);
    document.getElementById("gen-note").textContent =
      `Generated\u00a0${d.toLocaleDateString(undefined, { day:"numeric", month:"short", year:"numeric" })}`;
  } catch (_) {}
}

allSides = parseXmlToSides(EMBEDDED_XML);
renderViewer();
</script>
